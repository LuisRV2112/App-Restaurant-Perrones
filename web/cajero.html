<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cajero — Los Perrones</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="marca" id="logoMarca">LOS PERRONES · CAJA</div>
  <div class="relleno"></div>
  <span id="quien" style="font-weight:800"></span>
  <button class="btn btn-mini" onclick="cerrarSesion()">Salir</button>
</header>

<main class="contenedor" style="max-width:1250px">
  <nav class="fila" id="vistas">
    <button class="btn btn-mostaza" data-v="pedidos" onclick="verVista('pedidos')">📋 Pedidos</button>
    <button class="btn" data-v="tomar" onclick="verVista('tomar')">🛒 Tomar pedido</button>
    <div class="grow"></div>
    <span id="miCaja"></span>
  </nav>

  <!-- ============ VISTA: PEDIDOS ============ -->
  <div id="vista-pedidos" class="mt">
    <div class="fila">
      <h2 style="font-size:32px;margin:0">Pedidos</h2>
      <div class="grow"></div>
      <span class="chip">🔄 se actualiza solo · tu historial es de hoy</span>
    </div>

    <div class="fila mt" id="filtros">
      <button class="btn btn-mostaza" data-f="activos" onclick="filtrar('activos')">Activos</button>
      <button class="btn" data-f="todos" onclick="filtrar('todos')">Todos</button>
    </div>

    <div id="listaPedidos" class="col mt"></div>
  </div>

  <!-- ============ VISTA: TOMAR PEDIDO (táctil para tablet) ============ -->
  <div id="vista-tomar" class="mt oculto">
    <div class="pos">
      <div class="pos-menu">
        <nav class="fila" id="posTabs"></nav>
        <div id="posGrid" class="pos-grid mt"></div>
      </div>
      <aside class="pos-carrito card">
        <h3 style="margin:0">🛒 Pedido actual</h3>
        <div id="posItems" class="col mt" style="max-height:32vh;overflow-y:auto"></div>
        <h3 class="centro" style="margin:8px 0">Total: <span class="precio-tag" id="posTotal">Q0.00</span></h3>

        <label>Nombre del cliente (opcional)</label>
        <input id="posNombre" placeholder="Ej. mesa 2, Juan...">
        <label>Pago</label>
        <select id="posPago" onchange="posCambioPago()">
          <option value="efectivo">💵 Efectivo</option>
          <option value="transferencia">🏦 Transferencia</option>
        </select>
        <span id="posZonaEfectivo">
          <label>Paga con (Q)</label>
          <input id="posPagaCon" type="number" min="0" step="0.01" inputmode="decimal" oninput="posCalcCambio()">
          <p id="posCambio" style="font-weight:800;margin:6px 0"></p>
        </span>

        <div class="fila mt">
          <button class="btn grow" onclick="limpiarPos()">🗑 Limpiar</button>
          <button class="btn btn-salsa grow" style="font-size:17px;padding:14px"
                  onclick="cobrarPos()">✅ Cobrar y mandar a cocina</button>
        </div>
      </aside>
    </div>
  </div>
</main>

<div id="modales"></div>

<script src="common.js"></script>
<script src="cajero.js"></script>
</body>
</html>
